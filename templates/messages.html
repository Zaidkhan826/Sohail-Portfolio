<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Messages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background: linear-gradient(135deg,#667eea,#764ba2);">

<div class="container py-5">

<div class="card shadow-lg border-0 rounded-4">

<div class="card-body">

<div class="container py-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2 class="fw-bold">
    📩 Client Messages
</h2>

<a href="/dashboard" class="btn btn-dark rounded-pill px-4">
    ⬅ Dashboard
</a>

</div>

<div class="card border-0 shadow-lg rounded-4">

<div class="card-body">

<div class="table-responsive">

<table class="table table-hover align-middle mb-0">

    <thead style="background:linear-gradient(90deg,#4f46e5,#2563eb);" class="text-white">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
    <th>Message</th>
    <th>Action</th>
</tr>
</thead>

<tbody>
    
{% for message in messages %}

<tr>
    <td>{{ message[0] }}</td>
    <td>{{ message[1] }}</td>
    <td>{{ message[2] }}</td>
    <td>{{ message[3] }}</td>
    <td>
    <a href="/reply/{{ message[0] }}">
        <button class="btn btn-primary rounded-pill px-3">
    💬 Reply
</button>
        <a href="/delete_message/{{ message[0] }}">
    <button class="btn btn-danger rounded-pill px-3">
    🗑 Delete
</button>
</a>
    </a>
</td>
</tr>

{% endfor %}

</table>

<br>
</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
