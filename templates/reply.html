<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reply to Client</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#f4f7fc;
        }

        .card{
            border-radius:20px;
        }
    </style>
</head>
<body>

<div class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="card border-0 shadow-lg rounded-4">

<div class="card-body p-5">

<div class="d-flex justify-content-between align-items-center mb-4">

<div>
    <h2 class="fw-bold mb-1">💬 Reply to Client</h2>
    <small class="text-muted">Send a professional response to your client</small>
</div>

<span class="badge bg-primary fs-6 px-3 py-2">
    Admin Panel
</span>

</div>

<div class="card bg-light border-0 shadow-sm mb-4">
    <div class="card-body">

        <h5 class="fw-bold mb-3">📩 Client Details</h5>

        <p class="mb-2">
            <strong>👤 Name:</strong> {{ message[0] }}
        </p>

        <p class="mb-2">
            <strong>📧 Email:</strong> {{ message[1] }}
        </p>

        <p class="mb-0">
            <strong>💬 Message:</strong><br>
            {{ message[2] }}
        </p>

    </div>
</div>
<hr>

<form method="POST">

    <label class="fw-bold mb-2">
    ✍️ Your Reply
</label><br><br>

    <textarea class="form-control rounded-4 shadow-sm"
style="min-height:220px; resize:none;"
    rows="8"
    name="reply"
    placeholder="Write your reply here..."
    required
></textarea>

    <br><br>

    <button type="submit" class="btn btn-success rounded-pill px-5 py-2 fw-semibold"">
    ✈️ Send Reply
</button>
<a href="/messages" class="btn btn-outline-secondary rounded-pill px-5 py-2 fw-semibold ms-2"">
    ⬅ Back
</a>
</form>

<br>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
